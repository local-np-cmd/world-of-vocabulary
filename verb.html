<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Full Verb Conjugation Match | English ↔ Nepali | 300+ Verbs</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1f6d7a 0%, #0e4b57 100%);
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            max-width: 1400px;
            width: 100%;
            background: #fffaf0;
            border-radius: 4rem 4rem 3rem 3rem;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3), inset 0 1px 4px rgba(255, 255, 255, 0.8);
            padding: 1.2rem 1.5rem 2rem;
            position: relative;
        }

        .home-btn-top {
            position: absolute;
            top: 1.2rem;
            left: 1.2rem;
            background: #ff8c5a;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 8px 18px;
            border-radius: 3rem;
            cursor: pointer;
            transition: transform 0.08s linear, background 0.2s;
            color: white;
            box-shadow: 0 4px 0 #c25a2a;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            z-index: 20;
            text-decoration: none;
        }

        .home-btn-top:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #c25a2a;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin: 0.5rem 0 0.25rem;
            background: linear-gradient(120deg, #3a7ca5, #1d5a7a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            font-weight: 800;
            padding-top: 0.5rem;
        }

        .subhead {
            text-align: center;
            font-weight: bold;
            background: #fff0cf;
            display: inline-block;
            width: auto;
            margin: 0 auto 1rem;
            padding: 0.4rem 1.5rem;
            border-radius: 3rem;
            font-size: 0.9rem;
            color: #d66b2d;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: #f7e9cf;
            padding: 0.6rem 1.2rem;
            border-radius: 4rem;
            margin-bottom: 1.8rem;
            gap: 12px;
            margin-top: 0.5rem;
        }

        .score-panel {
            background: #2e5c4a;
            padding: 0.3rem 1rem;
            border-radius: 3rem;
            color: #f9eec1;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: inset 0 -1px 0 #3d7860, 0 4px 0 #1f3e32;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .score-item {
            display: inline-flex;
            align-items: baseline;
            gap: 0.3rem;
        }

        .score-label {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #f7b32b;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 8px 18px;
            border-radius: 3rem;
            cursor: pointer;
            transition: transform 0.08s linear;
            color: #2d2b1f;
            box-shadow: 0 4px 0 #a45d2a;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #a45d2a;
        }

        .reset-btn {
            background: #6c9ebf;
            color: white;
            box-shadow: 0 4px 0 #3e607a;
        }

        .page-btn {
            background: #56ab7c;
            color: white;
            box-shadow: 0 4px 0 #2e6b49;
        }

        .verb-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff5e6;
            padding: 0.2rem 1rem;
            border-radius: 3rem;
            flex-wrap: wrap;
            flex-shrink: 1;
            min-width: 0;
        }

        .verb-selector label {
            font-weight: bold;
            color: #b45f2b;
            white-space: nowrap;
        }

        select {
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            border: none;
            background: #ffefcd;
            cursor: pointer;
            outline: none;
            max-width: 100%;
            text-overflow: ellipsis;
        }

        .message-box {
            background: #fff0d4;
            border-radius: 2.5rem;
            padding: 0.4rem 1rem;
            font-weight: bold;
            font-size: 0.85rem;
            text-align: center;
            color: #bf5e1a;
            flex-shrink: 1;
            min-width: 150px;
        }

        .match-zone {
            position: relative;
            display: flex;
            gap: 2rem;
            background: #fffbe6;
            border-radius: 3rem;
            padding: 2rem 1rem;
            margin-top: 0.5rem;
            box-shadow: inset 0 0 0 3px white, 0 12px 25px rgba(0, 0, 0, 0.1);
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .column h3 {
            text-align: center;
            font-size: 1.6rem;
            margin: 0 0 0.2rem;
            color: #e58734;
            background: #ffefcd;
            width: fit-content;
            padding: 0.2rem 1.2rem;
            border-radius: 3rem;
            align-self: center;
        }

        .word-card {
            background: white;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 4rem;
            cursor: pointer;
            transition: all 0.12s;
            box-shadow: 0 8px 0 #c0a16b;
            border: 2px solid #ffd995;
            position: relative;
            min-height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 0.5rem;
            line-height: 1.3;
            word-break: break-word;
        }

        .eng-card {
            background: #d9effa;
            color: #004b6e;
            border-left: 10px solid #3a86ff;
        }

        .nep-card {
            background: #fff0cf;
            color: #8b5a2b;
            border-right: 10px solid #f5b85b;
            font-size: 1.2rem;
        }

        .word-card.selected {
            background: #fff0a3;
            transform: scale(0.97);
            box-shadow: 0 4px 0 #b87c2e;
        }

        .word-card.matched {
            background: #a7d0a7;
            opacity: 0.9;
            cursor: default;
            box-shadow: 0 4px 0 #5b784e;
            pointer-events: none;
        }

        .word-card.matched::after {
            content: " ✓";
            font-size: 1.6rem;
            font-weight: bold;
            color: #1b6b1b;
            display: inline-block;
            margin-left: 6px;
        }

        .line-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .match-line {
            stroke: #289b48;
            stroke-width: 5;
            stroke-linecap: round;
            filter: drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.2));
        }

        .footer-note {
            text-align: center;
            margin-top: 1.2rem;
            font-weight: bold;
            color: #966f3a;
            background: #fff2df;
            width: fit-content;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            margin-left: auto;
            margin-right: auto;
            font-size: 0.75rem;
        }

        @media (max-width: 720px) {
            .game-container { padding: 1rem; }
            .home-btn-top {
                position: relative;
                top: auto;
                left: auto;
                display: inline-flex;
                margin: 0 0 0.8rem 0;
                width: fit-content;
                font-size: 0.9rem;
                padding: 8px 16px;
            }
            .home-wrapper {
                display: flex;
                justify-content: flex-start;
                margin-bottom: 0.5rem;
            }
            h1 { font-size: 1.5rem; margin-top: 0.2rem; padding-top: 0; }
            .word-card { font-size: 1rem; min-height: 70px; padding: 0.5rem 0.2rem; }
            .nep-card { font-size: 0.9rem; }
            .column h3 { font-size: 1.2rem; }
            button { padding: 5px 12px; font-size: 0.7rem; }
            .match-zone { gap: 1rem; }
            .column { gap: 1rem; }
            .word-card.matched::after { font-size: 1rem; }
            .score-panel { font-size: 0.9rem; }
            .top-bar { flex-direction: column; align-items: stretch; margin-top: 0; }
            .verb-selector { justify-content: space-between; }
            .nav-buttons { justify-content: center; }
            .message-box { text-align: center; }
            select { font-size: 0.8rem; padding: 0.2rem 0.5rem; }
        }

        @media (min-width: 721px) {
            .home-wrapper {
                display: block;
                position: relative;
            }
            .home-btn-top {
                position: absolute;
                top: 1.2rem;
                left: 1.2rem;
            }
            h1 {
                margin-top: 0.5rem;
                padding-top: 0.5rem;
            }
        }

        .wrong-flash {
            animation: shakeFlash 0.3s ease;
        }
        @keyframes shakeFlash {
            0% { background-color: #ffc2c2; transform: translateX(0);}
            30% { transform: translateX(-4px);}
            70% { transform: translateX(4px);}
            100% { background-color: inherit; transform: translateX(0);}
        }
    </style>
</head>

    // Universal function: remove trailing halant (्) from any string
    function removeTrailingHalant(str) {
        if (!str) return str;
        // Remove the halant character (U+094D) if it appears at the end
        return str.replace(/\u094D$/, '');
    }

    // Get clean stem from base verb: remove "नु" and any trailing halant
    function getStem(base) {
        if (!base) return '';
        let stem = base.replace(/नु$/, '');
        // Also remove any other trailing halant that might remain
        stem = removeTrailingHalant(stem);
        return stem;
    }

    // Generate Nepali form using universal rule (for regular verbs)
    function getNepaliFormRegular(base, suffix) {
        let stem = getStem(base);
        return stem + suffix;
    }

    function getNepali(englishVerb, tense) {
        let base = baseNepaliMap[englishVerb];
        if (!base) return englishVerb + " (?)";
        if (tense === 'base') return base;
        if (tense === 'past') return irregularPast[englishVerb] || getNepaliFormRegular(base, "यो");
        if (tense === 'participle') return irregularParticiple[englishVerb] || getNepaliFormRegular(base, "एको");
        if (tense === 'continuous') return irregularContinuous[englishVerb] || getNepaliFormRegular(base, "दै");
        if (tense === 'third') return irregularThird[englishVerb] || getNepaliFormRegular(base, "छ");
        return base;
    }

    const irregularEngContinuous = {
        "run":"running","swim":"swimming","hop":"hopping","skip":"skipping","clap":"clapping","dip":"dipping","drop":"dropping"
    };
    function getEnglishForm(verb, tense) {
        if (tense === 'base') return verb;
        if (tense === 'past') return irregularEngPast[verb] || (verb + "ed");
        if (tense === 'participle') return irregularEngParticiple[verb] || (verb + "ed");
        if (tense === 'continuous') {
            if (irregularEngContinuous[verb]) return irregularEngContinuous[verb];
            if (verb.match(/[aeiou]c$|^[^aeiou]*[aeiou][^aeiou]$/i) && !verb.endsWith('e')) return verb + verb.slice(-1) + "ing";
            if (verb.endsWith('e')) return verb.slice(0,-1) + "ing";
            return verb + "ing";
        }
        if (tense === 'third') {
            if (verb.endsWith('y') && !'aeiou'.includes(verb.slice(-2,-1))) return verb.slice(0,-1) + "ies";
            if (verb.endsWith('s')||verb.endsWith('sh')||verb.endsWith('ch')||verb.endsWith('x')||verb.endsWith('z')) return verb + "es";
            return verb + "s";
        }
        return verb;

    function playSoftBeep() {
        const ctx = getAudioContext();
        if (!ctx) return;
        if (ctx.state === 'suspended') ctx.resume();

            const now = ctx.currentTime;

            const gain = ctx.createGain();
            osc.connect(gain);

            gain.gain.value = 0.12;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
            osc.stop(now + 0.2);
        } catch(e) {}
    }

            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sawtooth';
            osc.frequency.value = 490;
            gain.gain.value = 0.35;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.35);
            osc.stop(now + 0.35);
        } catch(e) {}
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function buildShuffledColumns(verbsArr) {
        const engItems = verbsArr.map((verb, idx) => ({ text: verb.eng, pairId: idx }));
        const nepItems = verbsArr.map((verb, idx) => ({ text: verb.nep, pairId: idx }));
        return { engShuffled: shuffle([...engItems]), nepShuffled: shuffle([...nepItems]) };
    }

    function clearLines() { lineLayer.innerHTML = ''; }
    function clearSelection() {
        if (selectedCard && selectedCard.element) selectedCard.element.classList.remove('selected');
        selectedCard = null;
    }

    function drawMatchLines() {
        clearLines();
        if (matchedPairs.length === 0) return;
        const container = document.getElementById('matchArea');
        const containerRect = container.getBoundingClientRect();
        if (containerRect.width === 0) return;
        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgNS, "svg");
        svg.setAttribute("width", "100%");
        svg.setAttribute("height", "100%");
        svg.style.position = "absolute";
        svg.style.top = "0";
        svg.style.left = "0";
        for (let pair of matchedPairs) {
            const engRect = pair.engEl.getBoundingClientRect();
            const nepRect = pair.nepEl.getBoundingClientRect();
            const startX = engRect.right - containerRect.left - 5;
            const startY = (engRect.top + engRect.bottom) / 2 - containerRect.top;
            const endX = nepRect.left - containerRect.left + 5;
            const endY = (nepRect.top + nepRect.bottom) / 2 - containerRect.top;
            const line = document.createElementNS(svgNS, "line");
            line.setAttribute("x1", startX);
            line.setAttribute("y1", startY);
            line.setAttribute("x2", endX);
            line.setAttribute("y2", endY);
            line.classList.add("match-line");
            svg.appendChild(line);
        }
        lineLayer.appendChild(svg);
    }

    function updateScoreUI() {
        matchCountSpan.innerText = matchedPairs.length;
        if (matchedPairs.length === totalInPage) {
            statusDiv.innerHTML = "🎉 PERFECT! All matched! Go to next page 🎉";
            statusDiv.style.backgroundColor = "#d4f5d0";
        } else {
            statusDiv.style.backgroundColor = "#fff0d4";
        }
    }

    function attemptMatch(newType, newElement, newPairId) {
        if (!selectedCard) return false;
        const { type: selType, element: selEl, pairId: selPair } = selectedCard;
        if ((selType === 'eng' && newType === 'nep') || (selType === 'nep' && newType === 'eng')) {
            if (selPair === newPairId) {
                if (selEl.classList.contains('matched') || newElement.classList.contains('matched')) {
                    statusDiv.innerHTML = "⛔ Already matched! Pick a new word.";
                    clearSelection();
                    return false;
                }
                selEl.classList.add('matched');
                newElement.classList.add('matched');
                matchedPairs.push({ engEl: selType === 'eng' ? selEl : newElement, nepEl: selType === 'nep' ? selEl : newElement, pairId: selPair });
                globalTotalScore++;
                updateGlobalTotalDisplay();
                updateScoreUI();
                drawMatchLines();
                clearSelection();
                return true;
            } else {
                playBuzz();
                [selEl, newElement].forEach(el => {
                    el.classList.add('wrong-flash');
                    setTimeout(() => el.classList.remove('wrong-flash'), 300);
                });
                statusDiv.innerHTML = "❌ Wrong match! Listen to buzzer, try again ❌";
                clearSelection();
                return false;
            }
        } else {
            clearSelection();
            if (!newElement.classList.contains('matched')) {
                selectedCard = { type: newType, element: newElement, pairId: newPairId };
                newElement.classList.add('selected');
                statusDiv.innerHTML = `👉 Selected: ${newElement.innerText} → now pick from the opposite column.`;
            }
            return false;
        }
    }

    function handleCardClick(e) {
        const card = e.target.closest('.word-card');
        if (!card) return;
        if (card.classList.contains('matched')) {
            statusDiv.innerHTML = "🔒 Already matched! Choose a different word.";
            return;
        }
        const cardType = card.getAttribute('data-type');
        const pairId = parseInt(card.getAttribute('data-pairid'));
        const wordText = card.innerText.trim();
        if (cardType === 'eng') speakText(wordText, 'en-US');
        else speakText(wordText, 'ne-NP');
        playSoftBeep();
        if (isNaN(pairId)) return;
        if (!selectedCard) {
            clearSelection();
            selectedCard = { type: cardType, element: card, pairId };
            card.classList.add('selected');
            statusDiv.innerHTML = `✨ Selected: ${wordText} → now match with opposite side ✨`;
            return;
        }
        attemptMatch(cardType, card, pairId);
    }

    function renderCurrentPage() {
        if (!currentPageVerbs) return;
        clearSelection();
        matchedPairs = [];
        clearLines();
        totalInPage = currentPageVerbs.length;
        totalCountSpan.innerText = totalInPage;
        updateScoreUI();
        const { engShuffled, nepShuffled } = buildShuffledColumns(currentPageVerbs);
        shuffledEnglish = engShuffled;
        shuffledNepali = nepShuffled;
        englishDiv.innerHTML = '';
        shuffledEnglish.forEach(item => {
            const card = document.createElement('div');
            card.className = 'word-card eng-card';
            card.textContent = item.text;
            card.setAttribute('data-type', 'eng');
            card.setAttribute('data-pairid', item.pairId);
            englishDiv.appendChild(card);
        });
        nepaliDiv.innerHTML = '';
        shuffledNepali.forEach(item => {
            const card = document.createElement('div');
            card.className = 'word-card nep-card';
            card.textContent = item.text;
            card.setAttribute('data-type', 'nep');
            card.setAttribute('data-pairid', item.pairId);
            nepaliDiv.appendChild(card);
        });
        const formNames = ['Base Form', 'Past Simple', 'Past Participle', 'Continuous', '3rd Person Singular'];
        statusDiv.innerHTML = `📘 ${formNames[currentForm]} · Page ${currentPageIdx+1}/${currentPages.length} · Tap words to match!`;
        statusDiv.style.backgroundColor = "#fff0d4";
    }

    function loadForm(formIndex) {
        currentForm = formIndex;
        const fullSet = verbSets[currentForm];
        const pages = [];
        for (let i = 0; i < fullSet.length; i += VERBS_PER_PAGE) {
            pages.push(fullSet.slice(i, i + VERBS_PER_PAGE));
        }
        currentPages = pages;
        currentPageIdx = 0;
        currentPageVerbs = currentPages[0];
        renderCurrentPage();
    }

    function nextPage() {
        if (currentPageIdx + 1 < currentPages.length) {
            currentPageIdx++;
            currentPageVerbs = currentPages[currentPageIdx];
            renderCurrentPage();
        } else {
            statusDiv.innerHTML = "📖 You're on the last page of this verb form!";
        }
    }
    function prevPage() {
        if (currentPageIdx - 1 >= 0) {
            currentPageIdx--;
            currentPageVerbs = currentPages[currentPageIdx];
            renderCurrentPage();
        } else {
            statusDiv.innerHTML = "🌟 This is the first page!";
        }
    }
    function resetCurrentPage() {
        if (currentPageVerbs) renderCurrentPage();
        statusDiv.innerHTML = "🔄 Page reset! Both columns shuffled. Total score remains.";
    }

    const matchZone = document.getElementById('matchArea');
    matchZone.addEventListener('click', handleCardClick);
    prevBtn.addEventListener('click', prevPage);
    nextBtn.addEventListener('click', nextPage);
    resetBtn.addEventListener('click', resetCurrentPage);
    formSelect.addEventListener('change', (e) => loadForm(parseInt(e.target.value)));
    window.addEventListener('resize', () => setTimeout(drawMatchLines, 30));
    new ResizeObserver(() => drawMatchLines()).observe(matchZone);

    updateGlobalTotalDisplay();
    loadForm(0);
</script>
</body>
</html>
