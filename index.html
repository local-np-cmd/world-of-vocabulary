<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Verb Match: English ↔ Nepali | Speak & Learn</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1f6d7a 0%, #0e4b57 100%);
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            max-width: 1400px;
            width: 100%;
            background: #fffaf0;
            border-radius: 4rem 4rem 3rem 3rem;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3), inset 0 1px 4px rgba(255, 255, 255, 0.8);
            overflow: hidden;
            padding: 1.2rem 1.5rem 2rem;
            transition: all 0.2s ease;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin: 0 0 0.25rem;
            color: #ffcd7e;
            text-shadow: 4px 4px 0 #b45f2b;
            letter-spacing: 1px;
        }

        .subhead {
            text-align: center;
            font-weight: bold;
            background: #fff0cf;
            display: inline-block;
            width: auto;
            margin: 0 auto 1rem;
            padding: 0.4rem 1.5rem;
            border-radius: 3rem;
            font-size: 1rem;
            color: #d66b2d;
            box-shadow: inset 0 1px 3px #0001, 0 2px 5px #fffa;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: #f7e9cf;
            padding: 0.6rem 1.5rem;
            border-radius: 4rem;
            margin-bottom: 1.8rem;
            gap: 12px;
        }

        .score-panel {
            background: #2e5c4a;
            padding: 0.4rem 1.2rem;
            border-radius: 3rem;
            color: #f9eec1;
            font-weight: bold;
            font-size: 1.3rem;
            box-shadow: inset 0 -1px 0 #3d7860, 0 4px 0 #1f3e32;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #f7b32b;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 8px 18px;
            border-radius: 3rem;
            cursor: pointer;
            transition: transform 0.08s linear;
            color: #2d2b1f;
            box-shadow: 0 4px 0 #a45d2a;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #a45d2a;
        }

        .reset-btn {
            background: #6c9ebf;
            color: white;
            box-shadow: 0 4px 0 #3e607a;
        }

        .page-btn {
            background: #56ab7c;
            color: white;
            box-shadow: 0 4px 0 #2e6b49;
        }

        .message-box {
            background: #fff0d4;
            border-radius: 2.5rem;
            padding: 0.5rem 1rem;
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
            color: #bf5e1a;
        }

        .match-zone {
            position: relative;
            display: flex;
            gap: 2rem;
            background: #fffbe6;
            border-radius: 3rem;
            padding: 2rem 1rem;
            margin-top: 0.5rem;
            box-shadow: inset 0 0 0 3px white, 0 12px 25px rgba(0, 0, 0, 0.1);
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .column h3 {
            text-align: center;
            font-size: 1.8rem;
            margin: 0 0 0.5rem;
            color: #e58734;
            background: #ffefcd;
            width: fit-content;
            padding: 0.2rem 1.6rem;
            border-radius: 3rem;
            align-self: center;
        }

        .word-card {
            background: white;
            padding: 1rem 0.5rem;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 5rem;
            cursor: pointer;
            transition: all 0.12s;
            box-shadow: 0 8px 0 #c0a16b;
            border: 2px solid #ffd995;
            position: relative;
        }

        .eng-card {
            background: #d9effa;
            color: #004b6e;
            border-left: 12px solid #3a86ff;
        }

        .nep-card {
            background: #fff0cf;
            color: #8b5a2b;
            font-size: 1.5rem;
            border-right: 12px solid #f5b85b;
        }

        .word-card.selected {
            background: #fff0a3;
            transform: scale(0.97);
            box-shadow: 0 4px 0 #b87c2e;
        }

        /* matched style: NO strikethrough, only check mark */
        .word-card.matched {
            background: #a7d0a7;
            opacity: 0.9;
            cursor: default;
            box-shadow: 0 4px 0 #5b784e;
            pointer-events: none;
        }

        /* check mark only - no line-through */
        .word-card.matched::after {
            content: " ✓";
            font-size: 1.8rem;
            font-weight: bold;
            color: #1b6b1b;
            display: inline-block;
            margin-left: 8px;
        }

        /* SVG line overlay */
        .line-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .match-line {
            stroke: #289b48;
            stroke-width: 5;
            stroke-linecap: round;
            filter: drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.2));
        }

        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-weight: bold;
            color: #966f3a;
            background: #fff2df;
            width: fit-content;
            padding: 0.4rem 1.2rem;
            border-radius: 3rem;
            margin-left: auto;
            margin-right: auto;
            font-size: 0.8rem;
        }

        @media (max-width: 720px) {
            .game-container {
                padding: 1rem;
            }
            .word-card {
                font-size: 1.2rem;
                padding: 0.7rem 0.2rem;
            }
            .nep-card {
                font-size: 1.1rem;
            }
            .column h3 {
                font-size: 1.4rem;
            }
            button {
                padding: 6px 12px;
                font-size: 0.75rem;
            }
            .match-zone {
                gap: 1rem;
            }
            .column {
                gap: 1.2rem;
            }
            .word-card.matched::after {
                font-size: 1.2rem;
            }
        }

        .wrong-flash {
            animation: shakeFlash 0.3s ease;
        }
        @keyframes shakeFlash {
            0% { background-color: #ffc2c2; transform: translateX(0);}
            30% { transform: translateX(-5px);}
            70% { transform: translateX(5px);}
            100% { background-color: inherit; transform: translateX(0);}
        }
    </style>
</head>
<body>
<div class="game-container" id="gameApp">
    <h1>🔊 VERB MATCH • अंग्रेजी ↔ नेपाली</h1>
    <div style="text-align: center;"><span class="subhead">✨ Tap any word → it speaks! Match to learn ✨</span></div>

    <div class="top-bar">

        <div class="nav-buttons">

            <button id="resetBtn" class="reset-btn">🔄 RESET</button>

    <div id="matchArea" class="match-zone">

    <div class="footer-note">
        💡 Click any word → speaks aloud. Match English ↔ Nepali. ✅ Check mark + green connecting line = correct!

</div>

","earn","buy","sell","trade","exchange","return","replace","move","shift","transfer","send","receive","accept","reject","agree","disagree","argue","discuss","explain","describe","repeat","practice","learn","teach","study","memorize","recall","forget","think","wonder","imagine","dream","hope","wish","try","attempt","succeed","fail","stop"

    // fallback for any missing
    for (let v of allEnglishVerbs) {
        if (!nepaliMap[v]) nepaliMap[v] = v + " (गर्नु)";
    }

    const VERBS_PER_PAGE = 5;
    const verbPages = [];
    for (let i = 0; i < allEnglishVerbs.length; i += VERBS_PER_PAGE) {
        const slice = allEnglishVerbs.slice(i, i + VERBS_PER_PAGE);
        const pageData = slice.map(eng => ({ eng, nep: nepaliMap[eng] }));
        verbPages.push(pageData);
    }

    // -------------------- GAME STATE --------------------
    let currentPageIdx = 0;
    let currentPageVerbs = null;
    let shuffledEnglish = [];    // { text, pairId }
    let shuffledNepali = [];
    let matchedPairs = [];       // { engEl, nepEl, pairId } for drawing lines
    let selectedCard = null;
    let totalInPage = 5;

    const englishDiv = document.getElementById('englishList');
    const nepaliDiv = document.getElementById('nepaliList');
    const matchCountSpan = document.getElementById('matchCount');
    const totalCountSpan = document.getElementById('totalCount');
    const statusDiv = document.getElementById('statusMsg');
    const lineLayer = document.getElementById('lineLayer');

    // ---------- SPEECH ----------
    function speakText(text, lang) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    // ---------- SOUND EFFECTS ----------
    let audioContext = null;
    function getAudioContext() {
        if (audioContext) return audioContext;
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { return null; }
        return audioContext;
    }
    function playSoftBeep() {
        const ctx = getAudioContext();
        if (!ctx) return;
        if (ctx.state === 'suspended') ctx.resume();
        try {
            const now = ctx.currentTime;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.value = 1000;
            gain.gain.value = 0.12;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
            osc.stop(now + 0.2);
        } catch(e) {}
    }
    function playBuzz() {
        const ctx = getAudioContext();
        if (!ctx) return;
        if (ctx.state === 'suspended') ctx.resume();
        try {
            const now = ctx.currentTime;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sawtooth';
            osc.frequency.value = 490;
            gain.gain.value = 0.35;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.35);
            osc.stop(now + 0.35);
        } catch(e) {}
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function buildShuffledColumns(verbsArr) {
        const engItems = verbsArr.map((verb, idx) => ({ text: verb.eng, pairId: idx }));
        const nepItems = verbsArr.map((verb, idx) => ({ text: verb.nep, pairId: idx }));
        return {
            engShuffled: shuffle([...engItems]),
            nepShuffled: shuffle([...nepItems])
        };
    }

    function clearLines() {
        lineLayer.innerHTML = '';
    }

    function drawMatchLines() {
        clearLines();
        if (matchedPairs.length === 0) return;
        const container = document.getElementById('matchArea');
        const containerRect = container.getBoundingClientRect();
        if (containerRect.width === 0) return;
        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgNS, "svg");
        svg.setAttribute("width", "100%");
        svg.setAttribute("height", "100%");
        svg.style.position = "absolute";
        svg.style.top = "0";
        svg.style.left = "0";
        for (let pair of matchedPairs) {
            const engRect = pair.engEl.getBoundingClientRect();
            const nepRect = pair.nepEl.getBoundingClientRect();
            const startX = engRect.right - containerRect.left - 5;
            const startY = (engRect.top + engRect.bottom) / 2 - containerRect.top;
            const endX = nepRect.left - containerRect.left + 5;
            const endY = (nepRect.top + nepRect.bottom) / 2 - containerRect.top;
            const line = document.createElementNS(svgNS, "line");
            line.setAttribute("x1", startX);
            line.setAttribute("y1", startY);
            line.setAttribute("x2", endX);
            line.setAttribute("y2", endY);
            line.classList.add("match-line");
            svg.appendChild(line);
        }
        lineLayer.appendChild(svg);
    }

    function clearSelection() {
        if (selectedCard && selectedCard.element) {
            selectedCard.element.classList.remove('selected');
        }
        selectedCard = null;
    }

    function updateScoreUI() {
        matchCountSpan.innerText = matchedPairs.length;
        if (matchedPairs.length === totalInPage) {
            statusDiv.innerHTML = "🎉 PERFECT! All matched! Go to next page 🎉";
            statusDiv.style.backgroundColor = "#d4f5d0";
        } else {
            statusDiv.style.backgroundColor = "#fff0d4";
        }
    }

    function attemptMatch(newType, newElement, newPairId) {
        if (!selectedCard) return false;
        const { type: selType, element: selEl, pairId: selPair } = selectedCard;
        if ((selType === 'eng' && newType === 'nep') || (selType === 'nep' && newType === 'eng')) {
            if (selPair === newPairId) {
                if (selEl.classList.contains('matched') || newElement.classList.contains('matched')) {
                    statusDiv.innerHTML = "⛔ Already matched! Pick a new word.";
                    clearSelection();
                    return false;
                }
                selEl.classList.add('matched');
                newElement.classList.add('matched');
                matchedPairs.push({ engEl: selType === 'eng' ? selEl : newElement, nepEl: selType === 'nep' ? selEl : newElement, pairId: selPair });
                updateScoreUI();
                drawMatchLines();
                clearSelection();
                return true;
            } else {
                playBuzz();
                [selEl, newElement].forEach(el => {
                    el.classList.add('wrong-flash');
                    setTimeout(() => el.classList.remove('wrong-flash'), 300);
                });
                statusDiv.innerHTML = "❌ Wrong match! Listen to buzzer, try again ❌";
                clearSelection();
                return false;
            }
        } else {
            clearSelection();
            if (!newElement.classList.contains('matched')) {
                selectedCard = { type: newType, element: newElement, pairId: newPairId };
                newElement.classList.add('selected');
                statusDiv.innerHTML = `👉 Selected: ${newElement.innerText} → now pick from the opposite column.`;
            }
            return false;
        }
    }

    function speakCard(card, cardType, wordText) {
        if (cardType === 'eng') speakText(wordText, 'en-US');
        else speakText(wordText, 'ne-NP');
    }

    function handleCardClick(e) {
        const card = e.target.closest('.word-card');
        if (!card) return;
        if (card.classList.contains('matched')) {
            statusDiv.innerHTML = "🔒 Already matched! Choose a different word.";
            return;
        }
        const cardType = card.getAttribute('data-type');
        const pairId = parseInt(card.getAttribute('data-pairid'));
        const wordText = card.innerText.trim();
        speakCard(card, cardType, wordText);
        playSoftBeep();
        if (isNaN(pairId)) return;
        if (!selectedCard) {
            clearSelection();
            selectedCard = { type: cardType, element: card, pairId };
            card.classList.add('selected');
            statusDiv.innerHTML = `✨ Selected: ${wordText} → now match with opposite side ✨`;
            return;
        }
        attemptMatch(cardType, card, pairId);
    }

    function renderCurrentPage() {
        if (!currentPageVerbs) return;
        clearSelection();
        matchedPairs = [];
        clearLines();
        totalInPage = currentPageVerbs.length;
        totalCountSpan.innerText = totalInPage;
        updateScoreUI();

        const { engShuffled, nepShuffled } = buildShuffledColumns(currentPageVerbs);
        shuffledEnglish = engShuffled;
        shuffledNepali = nepShuffled;

        englishDiv.innerHTML = '';
        shuffledEnglish.forEach(item => {
            const card = document.createElement('div');
            card.className = 'word-card eng-card';
            card.textContent = item.text;
            card.setAttribute('data-type', 'eng');
            card.setAttribute('data-pairid', item.pairId);
            englishDiv.appendChild(card);
        });

        nepaliDiv.innerHTML = '';
        shuffledNepali.forEach(item => {
            const card = document.createElement('div');
            card.className = 'word-card nep-card';
            card.textContent = item.text;
            card.setAttribute('data-type', 'nep');
            card.setAttribute('data-pairid', item.pairId);
            nepaliDiv.appendChild(card);
        });

        statusDiv.innerHTML = `📘 Page ${currentPageIdx+1} / ${verbPages.length} · Tap any word to hear it!`;
        statusDiv.style.backgroundColor = "#fff0d4";
    }

    function loadPage(pageNumber) {
        if (pageNumber < 0) pageNumber = 0;
        if (pageNumber >= verbPages.length) pageNumber = verbPages.length - 1;
        currentPageIdx = pageNumber;
        currentPageVerbs = verbPages[currentPageIdx];
        renderCurrentPage();
    }

    function resetCurrentPage() {
        if (!currentPageVerbs) return;
        renderCurrentPage();
        statusDiv.innerHTML = "🔄 Page reset! Both columns shuffled. Keep matching!";
    }

    function nextPage() {
        if (currentPageIdx + 1 < verbPages.length) loadPage(currentPageIdx + 1);
        else statusDiv.innerHTML = "🎉 You finished all pages! Great job! 🎉";
    }
    function prevPage() {
        if (currentPageIdx - 1 >= 0) loadPage(currentPageIdx - 1);
        else statusDiv.innerHTML = "🌟 This is the first page! Enjoy learning! 🌟";
    }

    const matchZone = document.getElementById('matchArea');
    matchZone.addEventListener('click', handleCardClick);
    document.getElementById('prevPageBtn').addEventListener('click', prevPage);
    document.getElementById('nextPageBtn').addEventListener('click', nextPage);
    document.getElementById('resetBtn').addEventListener('click', resetCurrentPage);
    window.addEventListener('resize', () => setTimeout(drawMatchLines, 30));
    const resizeObserver = new ResizeObserver(() => drawMatchLines());
    resizeObserver.observe(matchZone);

    loadPage(0);
</script>
</body>
</html>
